<nav class="ai-navbar" role="navigation" aria-label="Main navigation">
  <div class="container ai-navbar__inner">

    <!-- Brand -->
    <a href="#home" class="ai-navbar__brand" (click)="closeMenu()" aria-label="Ambika Infotech home">
      <span class="ai-navbar__logo-icon" aria-hidden="true">
        <i class="bi bi-hexagon-fill"></i>
        <i class="bi bi-code-slash"></i>
      </span>
      <span class="ai-navbar__logo-text">
        Ambika<span class="gradient-text">Infotech</span>
      </span>
    </a>

    <!-- Desktop nav (hidden on mobile) -->
    <ul class="ai-navbar__links d-none d-lg-flex" role="list">
      @for (link of navLinks; track link.href) {
        <li>
          <a [href]="link.href" class="ai-navbar__link">{{ link.label }}</a>
        </li>
      }
    </ul>

    <!-- CTA (desktop only) -->
    <a href="#contact" class="btn btn-gradient d-none d-lg-inline-flex align-items-center gap-2">
      <i class="bi bi-chat-dots" aria-hidden="true"></i> Let's Talk
    </a>

    <!-- Hamburger (mobile only) -->
    <button
      class="ai-navbar__hamburger d-lg-none"
      [class.ai-navbar__hamburger--open]="menuOpen()"
      (click)="toggleMenu()"
      [attr.aria-expanded]="menuOpen()"
      aria-controls="mobile-menu"
      aria-label="Toggle navigation menu"
    >
      <i [class]="menuOpen() ? 'bi bi-x-lg' : 'bi bi-list'" aria-hidden="true"></i>
    </button>

  </div>

  <!-- Mobile menu panel -->
  <div
    id="mobile-menu"
    class="ai-navbar__mobile"
    [class.ai-navbar__mobile--open]="menuOpen()"
    [attr.aria-hidden]="!menuOpen()"
  >
    <div class="container">
      <ul class="ai-navbar__mobile-list" role="list">
        @for (link of navLinks; track link.href) {
          <li>
            <a [href]="link.href" class="ai-navbar__mobile-link" (click)="closeMenu()">
              <span class="ai-navbar__mobile-link-icon" aria-hidden="true">
                <i class="bi {{ link.icon }}"></i>
              </span>
              <span class="ai-navbar__mobile-link-label">{{ link.label }}</span>
              <i class="bi bi-chevron-right ai-navbar__mobile-link-chevron" aria-hidden="true"></i>
            </a>
          </li>
        }
      </ul>

      <div class="ai-navbar__mobile-cta">
        <a href="#contact" class="btn btn-gradient w-100" (click)="closeMenu()">
          <i class="bi bi-chat-dots me-2" aria-hidden="true"></i> Let's Talk
        </a>
      </div>
    </div>
  </div>
</nav>
