<section id="technologies" class="section tech" aria-labelledby="tech-heading">
  <div class="container">

    <div class="text-center mb-5">
      <div class="gradient-divider reveal"></div>
      <h2 id="tech-heading" class="section__title gradient-text reveal delay-1">Our Tech Stack</h2>
      <p class="section__subtitle reveal delay-2">
        Modern, battle-tested technologies that power every project we deliver.
      </p>
    </div>

    <!-- Filter pills -->
    <div class="tech__filters reveal delay-3" role="group" aria-label="Filter technologies by category">
      @for (cat of categories; track cat) {
        <button
          class="tech__filter-btn"
          [class.active]="activeCategory() === cat"
          (click)="setCategory(cat)"
          [attr.aria-pressed]="activeCategory() === cat"
        >
          {{ cat }}
        </button>
      }
    </div>

    <!-- Tech grid -->
    <div class="tech__grid" role="list">
      @for (tech of filtered(); track tech.name; let i = $index) {
        <div class="tech__item glass-card" role="listitem"
          [attr.aria-label]="tech.name + ' - ' + tech.category"
          [style.animation-delay]="(i * 0.05) + 's'">
          <div class="tech__item-icon" [style.--tech-color]="tech.color" aria-hidden="true">
            <i [class]="'bi ' + tech.icon"></i>
          </div>
          <span class="tech__item-name">{{ tech.name }}</span>
          <span class="tech__item-cat">{{ tech.category }}</span>
        </div>
      }
    </div>

  </div>
</section>
